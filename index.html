<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="assets/favicon-ink.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="assets/favicon-cream.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="assets/favicon-ink.png" />
  <link rel="apple-touch-icon" href="assets/favicon-ink.png" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Ritual.jsx"></script>
  <script type="text/babel" src="Gallery.jsx"></script>
  <script type="text/babel" src="Closing.jsx"></script>
  <script type="text/babel" src="BookingModal.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <>
          <Header />
          <main>
            <Hero />
            <Strip />
            <About />
            <Services />
            <Ritual />
            <Gallery />
            <Quote />
            <Booking />
          </main>
          <Footer />
          <BookingModal />
        </>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    // Arm entrance animations only when the page is actually visible and motion is allowed.
    // Backgrounded tabs (screenshots, verifier), print, and reduced-motion keep content visible.
    if (document.visibilityState === 'visible' &&
        !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.classList.add('anim');
    }
    root.render(<App />);
  </script>
</body>
