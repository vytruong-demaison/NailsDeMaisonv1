# Netlify configuration for Nails De Maison
# Static site (published from repo root) + serverless booking API.

[build]
  publish = "."
  functions = "netlify/functions"

# Same-origin API: the frontend fetches /api/* and Netlify rewrites those
# requests to the matching serverless function (/api/book -> book.js, etc.).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Shareable booking link: /book serves the homepage (URL stays "/book") and the
# booking modal auto-opens on arrival. Use this for ads, texts, and the GBP
# "Book" button. status = 200 is a rewrite, so the address bar keeps reading /book.
[[redirects]]
  from = "/book"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
